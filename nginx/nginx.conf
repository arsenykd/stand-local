worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # === RATE LIMITING ===
    # Определяем зону для ограничения 10 запросов/сек на IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # === ОГРАНИЧЕНИЕ РАЗМЕРА ТЕЛА ===
    client_max_body_size 10M;

    # === HTTP → HTTPS REDIRECT ===
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # === HTTPS SERVER ===
    server {
        listen 443 ssl http2;
        server_name localhost;

        # SSL (self-signed)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Заголовки безопасности
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # === РОУТИНГ НА BACKEND ===
        location / {
            # Применяем rate limiting (10 r/s)
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend:8080;
            proxy_http_version 1.1;

            # === ПРАВИЛЬНЫЕ ЗАГОЛОВКИ ===
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Таймауты
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Балансировка (для одного бэкенда)
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # Эндпоинт для healthcheck (не ограничиваем rate)
        location /status {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Обработка ошибок
        error_page 429 /429.html;
        location = /429.html {
            return 429 "Too Many Requests\n";
            add_header Content-Type text/plain;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
